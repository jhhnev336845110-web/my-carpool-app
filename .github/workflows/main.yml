name: Build APK
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev python3-dev zip unzip openjdk-17-jdk libncurses6 libstdc++6 zlib1g-dev libtool autoconf cmake gettext
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 kivy

      - name: Build with Buildozer
        run: |
          # מחיקת תיקיית העבודה הישנה כדי להתחיל דף חלק לגמרי
          rm -rf .buildozer
          yes | buildozer android debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: carpool-app
          path: bin/*.apk
