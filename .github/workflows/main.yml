name: Build APK
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Buildozer and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip buildozer git zip unzip openjdk-17-jdk libncurses5 libstdc++6 zlib1g-dev
          pip install --upgrade pip
          pip install cython==0.29.33 kivy

      - name: Build APK
        run: |
          yes | buildozer android debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: carpool-app
          path: bin/*.apk
